<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="https://kit.fontawesome.com/3478c33dcb.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/normalice.css">
  <title>Frontend Mentor | Ping coming soon page</title>
</head>
<body>
  <main class="main container">
    <img src="./images/logo.svg" alt="Ping" class="main-logo">
    <h1 class="main-title">
      We are launching <span>soon!</span>
    </h1>
    <p class="main-paragraph">
      Subscribe and get notified
    </p>
    <form action="#" class="main__form">
      <input type="email" name="email" class="form-email" placeholder="Your email address...">
      <input type="submit" value="Notify Me" class="form-submit">
    </form>
    <div class="form-panel">
      <div class="form__message">
        <i class="fa-solid fa-circle-info fa-4x message-icon"></i>
        <p class="message-paragraph">
        </p>
        <button class="message-button">X</button>
      </div>
    </div>
    <img src="./images/illustration-dashboard.png" alt="" aria-disabled="true" class="main-ilustration">
  </main>
  <footer class="footer container">
    <address class="footer__social">
      <a href="#" class="social-cta"><i class="fa-brands fa-facebook-f fa-xl"></i></a>
      <a href="#" class="social-cta"><i class="fa-brands fa-twitter fa-xl"></i></a>
      <a href="#" class="social-cta"><i class="fa-brands fa-instagram fa-xl"></i></a>
    </address>
    <p class="footer-copy">
      &copy; Copyright Ping. All rights reserved.
    </p>
    <p class="attribution">
      Coded by <a href="https://github.com/flchris" target="_blank">CHRIS FLッ</a>.
    </p>
  </footer>
  <script src="./js/index.js"></script>
</body>
</html>
